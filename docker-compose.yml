services:
  app:
    build: .
    container_name: medilink-api
    ports:
      - "3000:3000"
    env_file:
      - ./config.env
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    container_name: medilink-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: medilink-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
